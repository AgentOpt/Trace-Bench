runs_dir: runs
mode: real
seeds: [123]

tasks:
  - id: hf:hotpot_qa
    eval_kwargs:
      num_train: 3
      num_validate: 2
      num_test: 1
      framework: dspy

trainers:
  - id: DSPyTrainer
    params_variants:
      # dspy_lm: stub  →  DummyLM, no API calls, safe for CI / smoke tests.
      # COPRO with depth=1, breadth=2: 2 candidate instructions, 1 round.
      - dspy_optimizer: copro
        dspy_lm: stub
        breadth: 2
        depth: 1
