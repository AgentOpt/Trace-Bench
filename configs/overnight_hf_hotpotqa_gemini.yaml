runs_dir: runs
mode: real
seeds: [123]
# All trainers in one config. The runner auto-injects framework: dspy for
# DSPyTrainer based on its FRAMEWORK class attribute — no framework key needed.
# Run with: trace-bench run --config configs/overnight_hf_hotpotqa_gemini.yaml
job_timeout: 7200

llm:
  model: gemini-3.1-flash-lite-preview

tasks:
  - id: hf:hotpot_qa
    eval_kwargs:
      num_train: 100
      num_validate: 100
      num_test: 100

trainers:

  - id: PrioritySearch
    params_variants:
      - ps_steps: 50
        ps_batches: 3

  - id: DSPyTrainer
    params_variants:
      - dspy_optimizer: mipro
        auto: light

      - dspy_optimizer: simba
        max_steps: 8
        bsize: 8
        max_demos: 4

      - dspy_optimizer: gepa
        auto: light
        reflection_minibatch_size: 3
