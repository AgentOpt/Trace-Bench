runs_dir: runs
mode: real
seeds: [123]

tasks:
  - id: hf:bbeh_eight/dyck_languages
    eval_kwargs:
      num_train: 5        # SIMBA default bsize=32, but we override below
      num_validate: 2
      num_test: 1
      framework: dspy

trainers:
  - id: DSPyTrainer
    params_variants:
      - dspy_optimizer: mipro
        auto: light
        num_candidates: 2
        max_bootstrapped_demos: 1
        max_labeled_demos: 1
