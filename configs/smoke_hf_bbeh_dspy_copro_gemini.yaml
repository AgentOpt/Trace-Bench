runs_dir: runs
mode: real
seeds: [123]
job_timeout: 600

llm:
  model: gemini-3.1-flash-lite-preview

tasks:
  - id: hf:bbeh_eight/dyck_languages
    eval_kwargs:
      num_train: 2
      num_validate: 2
      num_test: 1
      framework: dspy

trainers:
  - id: DSPyTrainer
    params_variants:
      - dspy_optimizer: copro
        breadth: 2
        depth: 1
