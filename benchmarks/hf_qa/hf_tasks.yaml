# Curated HuggingFace QA tasks for the `hf:` suite.
#
# Each entry is loaded by benchmarks/hf_qa/hf_qa_loader.py.
# To add a new task with existing semantics, append an entry here.
# New task semantics require a matching module in this directory.
#
# HotpotQA is a large dataset with 7,405 samples in their validation split.
# We hard-code the train/validation/test splits to avoid loading the entire dataset.
#
# Required fields:
#   id            : used as `hf:<id>` in configs
#   dataset_id    : HuggingFace dataset name passed to load_dataset()
#   split         : dataset split to use
#   question_field: field name containing the question string
#   answer_field  : field name containing the gold answer string
#   context_format: how to flatten the raw context field into a string
#                   "hotpot_qa" → {"title": [...], "sentences": [[...]]} → joined paragraphs
#                   "bbeh"      → {"input": [...], "target": [...]} → joined paragraphs
#                   "plain"     → field is already a plain string
#
# Optional fields:
#   dataset_config  : HuggingFace config name (e.g. "distractor", "plain_text")
#   train_split     : HF split used for train + val examples (default: "train")
#   task_type       : task semantics module key (data shaping + guide).
#                     Defaults to `agent_class` for backward compatibility.
#                     This decouples task semantics from agent implementation family.
#   context_field   : override which raw field to use as context
#   options_field   : MCQ option field for task_type: mcqa
#   answer_index_base: MCQ integer answer base, usually 0 or 1
#   test_split      : HF split used for test examples (default: same as train_split;
#                     when the same split is reused, partitions are disjoint slices)
#   split           : fallback split when train_split/test_split are not set
#   description     : short human-readable description
#   objective       : optimizer objective injected into optimizer_kwargs

- id: hotpot_qa
  dataset_id: hotpotqa/hotpot_qa
  dataset_config: distractor
  train_split: train        # train + validation examples come from the HF train split
  test_split: validation    # test examples come from the HF validation split
  num_train: 100
  num_validate: 100
  num_test: 100
  question_field: question
  answer_field: answer
  context_format: hotpot_qa
  description: "HotpotQA multi-hop reasoning (distractor setting)"
  objective: |
    You are an expert in agent prompt optimization for HotpotQA (multi-hop reasoning).
    Questions require reasoning over information spread across multiple context paragraphs.
    Your goal is to optimize meta_instructions described in #Variables for an agent.

    #Variables:
    - meta_instructions: General instructions for the agent's reasoning and formatting.

    Goal: Create instructions that generalize across all tasks based on local feedback
    from specific question-answer pairs.

# ---------------------------------------------------------------------------
# BigBenchExtraHard (BBEH) — 23 subtasks, each is a dataset split
#
# agent_class: bbeh  →  uses BBEHAgent (prompt_template + extract_answer)
#                        instead of the default HFQAAgent
# context_format: none  →  no context, question-only
# subtasks: list of split names that are expanded into individual task IDs:
#   hf:bbeh/boolean_expressions, hf:bbeh/boardgame_qa, etc.
# ---------------------------------------------------------------------------
- id: bbeh
  dataset_id: hubert233/BigBenchExtraHard
  question_field: input
  answer_field: target
  context_format: none
  agent_class: bbeh
  description: "BigBenchExtraHard — reasoning tasks across 23 subtasks"
  objective: |
    You are an expert in agent prompt optimization for BigBench Hard reasoning tasks.
    Your goal is to optimize the prompt_template and answer extraction logic described
    in #Variables so the agent answers a variety of reasoning questions correctly.

    #Variables:
    - prompt_template: Instructions and format template given to the LLM.
    - extract_answer: Code that parses the LLM response into a final answer.

    Goal: Create a prompt and extraction logic that generalizes across all question
    types based on local feedback from specific examples.
  subtasks:
    - boardgame_qa
    - boolean_expressions
    - buggy_tables
    - causal_understanding
    - disambiguation_qa
    - dyck_languages
    - geometric_shapes
    - hyperbaton
    - linguini
    - movie_recommendation
    - multistep_arithmetic
    - nycc
    - object_counting
    - object_properties
    - sarc_triples
    - shuffled_objects
    - spatial_reasoning
    - sportqa
    - temporal_sequence
    - time_arithmetic
    - web_of_lies
    - word_sorting
    - zebra_puzzles

