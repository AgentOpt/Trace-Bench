# ===========================================================================
# DIAGNOSTIC FAMILIES for recursive_opt (added alongside the QA suite)
#
# These exist to give recursive_opt's causal-effect knobs a measurable surface:
#   - bbeh_horizon : long reasoning chains  -> exercises credit_horizon
#   - aqua_rat     : algebraic 5-way MCQ    -> starting_artifact headroom (reuses mcqa)
#   - strategy_qa  : implicit multi-hop Y/N -> starting_artifact headroom
#   - humaneval    : code + unit tests      -> CodeArtifactLevel surface (code_exec)
#   - mbpp         : code + unit tests      -> CodeArtifactLevel surface (code_exec)
# All are additive: they only append entries / new task_type modules, so existing
# task ids and other branches are unaffected.
# ===========================================================================

# bbeh_horizon — the long-chain BBEH subtasks where step-level vs episode-level
# feedback (credit_horizon) plausibly changes update quality. Pure curation of
# existing bbeh semantics: no new code, just a focused subtask list.
- id: bbeh_horizon
  dataset_id: hubert233/BigBenchExtraHard
  question_field: input
  answer_field: target
  context_format: none
  agent_class: bbeh
  task_type: bbeh
  description: "BBEH long-horizon reasoning subset (for credit_horizon diagnostics)"
  objective: |
    Optimize the prompt_template and extraction logic for multi-step reasoning
    chains where intermediate steps must be tracked to reach the final answer.

    #Variables:
    - prompt_template: Instructions and format template given to the LLM.
    - extract_answer: Code that parses the LLM response into a final answer.
  subtasks:
    - multistep_arithmetic
    - web_of_lies
    - dyck_languages
    - shuffled_objects
    - temporal_sequence
    - object_counting
    - time_arithmetic
    - zebra_puzzles

# AQuA-RAT — algebraic word problems as 5-way MCQ. Reuses mcqa semantics
# entirely (options list + letter answer); YAML-only.
- id: aqua_rat
  dataset_id: deepmind/aqua_rat
  dataset_config: raw
  train_split: train
  test_split: test
  num_train: 128
  num_validate: 128
  num_test: 128
  question_field: question
  answer_field: correct
  options_field: options
  context_format: none
  task_type: mcqa
  agent_class: bbeh
  description: "AQuA-RAT algebraic multiple-choice reasoning"
  objective: |
    Optimize the prompt template and extraction logic for algebraic word-problem
    reasoning with multiple-choice answers.

