# HumanEval — function synthesis scored by executing the provided unit tests.
- id: humaneval
  dataset_id: openai/openai_humaneval
  split: test
  test_split: test
  num_train: 41
  num_validate: 41
  num_test: 82
  question_field: prompt
  answer_field: entry_point
  test_field: test
  entry_field: entry_point
  context_format: none
  task_type: code_exec
  agent_class: code
  timeout: 10
  description: "HumanEval Python function synthesis (unit-test scored)"
  objective: |
    Optimize the prompt template and code-generation instructions so the produced
    Python function passes all provided unit tests.

# MBPP — basic Python problems; tests are bare asserts (+ optional setup code).
- id: mbpp
  dataset_id: google-research-datasets/mbpp
  dataset_config: sanitized
  train_split: train
  test_split: test
  num_train: 120
  num_validate: 90
  num_test: 257
  question_field: prompt
  answer_field: entry_point
  test_field: test_list
  setup_field: test_setup_code
  context_format: none
  task_type: code_exec
  agent_class: code
  timeout: 10
  description: "MBPP basic Python programming problems (unit-test scored)"
  objective: |
    Optimize the prompt template and code-generation instructions so the produced
    Python function passes all provided unit tests.
